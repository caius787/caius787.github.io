<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- style-src needs 'unsafe-inline' because Vite's dev server injects
         CSS as dynamic <style> tags (and React inline-style attributes are
         emitted via setAttribute("style", ...) which CSP also gates). The
         risk this opens (inline CSS-based XSS) is far smaller than what
         script-src 'self' continues to block. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'"
    />
