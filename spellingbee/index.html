<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spelling Bee Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Hegarty&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'BBH Hegarty', 'Poppins', sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .container {
            width: min(100%, 960px);
            padding: 0 24px;
            position: relative;
        }
        h1 { color: #333; margin-top: 0; }

        .frame {
            border: 6px solid #333;
            border-radius: 16px;
            height: 260px;
            display: flex;
            align-items: stretch;
            justify-content: center;
            margin: 24px auto;
            padding: 24px;
            background: #fafafa;
        }
        .frame-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            gap: 16px;
        }
        .audio-status {
            font-size: 32px;
            line-height: 1;
            color: #333;
            text-align: center;
        }
        .audio-status.listening {
            color: #ff6b35;
            animation: pulse 1s infinite;
        }
        .audio-status.correct {
            color: #2e7d32;
        }
        .audio-status.incorrect {
            color: #c62828;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .answer-area {
            flex: 1;
            border-radius: 12px;
            padding: 20px 32px;
            font-size: 40px;
            text-align: center;
            font-family: 'BBH Hegarty', 'Poppins', sans-serif;
            outline: none;
            background: white;
            overflow-y: auto;
            max-width: 760px;
            margin: 0 auto;
            min-height: 120px;
        }
        .answer-area.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .answer-area:empty::before {
            content: attr(data-placeholder);
            color: #999;
        }

        .controls {
            margin-top: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 20px;
            margin: 4px 8px;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.98);
        }
        .secondary {
            background-color: #ff6b35;
            font-size: 18px;
            padding: 12px 24px;
        }
        .wpm-display {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: 700;
            padding: 16px 32px;
            background: #333;
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="wpm-display hidden">WPM: <span id="wpmValue">0</span></div>

        <div id="game-area" class="hidden">
            <div class="frame">
                <div class="frame-content">
                    <div id="audioStatus" class="audio-status">Press Start to begin</div>
                    <div id="answer" class="answer-area disabled" contenteditable="false"
                         data-placeholder="Type the word you hear and press Enter"></div>
                </div>
            </div>
            <div class="controls">
                <button id="speak" class="secondary hidden" type="button">🔊 Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // Audio elements
        const yourWordAudio = new Audio('yourwordis.mp3');
        const correctSound = new Audio('ding-sound-effect_2.mp3');
        const wrongSound = new Audio('incorrect.swf.mp3');
        // Individual audio files - word names match the mp3 filenames
        const wordList = [
            'abolish', 'absense', 'abstract', 'agaric', 'albeit', 'alliance', 'anotomical', 'appetite',
            'automatic', 'biography', 'bizzare', 'broccoli', 'center', 'chargoggagogmanchauggagoggchaubunagungamaugg',
            'chronic', 'church', 'congratulate', 'cooking', 'curious', 'damage', 'debris', 'diesel', 'dolphin',
            'enact', 'excellent', 'familiar', 'firefighter', 'flavor', 'formidable', 'frolic', 'furious', 'gallant',
            'gradual', 'guideline', 'harbor', 'heresy', 'immobilize', 'integrity', 'ionize', 'lactose', 'lather',
            'liable', 'lightning', 'magnificent', 'meditate', 'normal', 'oasis', 'obesity', 'offender', 'overdue',
            'paradox', 'password', 'pigeon', 'plethora', 'powder', 'probably', 'pumpkin', 'pursuit', 'queen',
            'recipient', 'refrain', 'refugee', 'remarkable', 'rye', 'scrutiny', 'secret', 'seldom', 'semicircle',
            'sigma', 'sniffle', 'special', 'spooky', 'strategic', 'subsidy', 'syntax', 'tangerine', 'telepathy',
            'thesis', 'tremendous', 'twenty', 'uncomfortable', 'vague', 'villain', 'window', 'zombie'
        ];

        const wordAudioCache = new Map();

        function formatWord(word) {
            return word
                .split('-')
                .map(segment => segment.charAt(0).toUpperCase() + segment.slice(1))
                .join(' ');
        }

        function normalize(s) {
            return (s || '').trim().toLowerCase();
        }

        const homophoneDictionary = {
            overdue: ['overdo'],
            center: ['centre'],
            flavor: ['flavour'],
            harbor: ['harbour'],
            ionize: ['ionise'],
            rye: ['wry']
        };

        // State
        let currentWordIndex = 0;
        let canSubmit = false;
        let hasSubmitted = false;
        let typingStartTime = null;
        let currentInputChars = 0;
        const audioStatus = document.getElementById('audioStatus');
        const inputEl = document.getElementById('answer');
        const speakBtn = document.getElementById('speak');
        const gameArea = document.getElementById('game-area');
        const wpmValueEl = document.getElementById('wpmValue');
        const wpmDisplayEl = document.querySelector('.wpm-display');
        let wpmDisplayTimeout = null;
        const startBtn = document.createElement('button');
        startBtn.textContent = 'Start Game';
        startBtn.style.padding = '15px 40px';
        startBtn.style.fontSize = '24px';
        startBtn.style.marginTop = '20px';
        document.querySelector('.container').appendChild(startBtn);

        function updateWpmDisplay() {
            if (!typingStartTime || currentInputChars <= 0) {
                wpmValueEl.textContent = '0.0';
                return;
            }

            const minutesElapsed = (Date.now() - typingStartTime) / 60000;
            if (minutesElapsed <= 0) {
                wpmValueEl.textContent = '0.0';
                return;
            }

            const wordsPerMinute = (currentInputChars / 5) / minutesElapsed;
            wpmValueEl.textContent = Math.max(wordsPerMinute, 0).toFixed(1);
        }

        function showWpmTemporarily() {
            if (wpmDisplayTimeout) {
                clearTimeout(wpmDisplayTimeout);
            }

            wpmDisplayEl.classList.remove('hidden');
            wpmDisplayTimeout = setTimeout(() => {
                wpmDisplayEl.classList.add('hidden');
                wpmDisplayTimeout = null;
            }, 5000);
        }

        function setAnswerEnabled(enabled) {
            inputEl.contentEditable = enabled ? 'true' : 'false';
            inputEl.classList.toggle('disabled', !enabled);
            if (!enabled) {
                inputEl.blur();
            }
        }

        function getAnswerValue() {
            return inputEl.textContent || '';
        }

        function setAnswerValue(value) {
            inputEl.textContent = value || '';
        }

        function resetGame() {
            currentWordIndex = 0;
            canSubmit = false;
            hasSubmitted = false;
            typingStartTime = null;
            currentInputChars = 0;
            setAnswerEnabled(false);
            setAnswerValue('');
            updateWpmDisplay();
            // Shuffle the word list
            for (let i = wordList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [wordList[i], wordList[j]] = [wordList[j], wordList[i]];
            }
        }

        function updateAudioStatus(message, className = '') {
            audioStatus.textContent = message;
            audioStatus.className = 'audio-status ' + className;
        }

        function playYourWordAudio() {
            return new Promise((resolve) => {
                yourWordAudio.currentTime = 0;
                yourWordAudio.play().then(() => {
                    yourWordAudio.onended = resolve;
                }).catch(e => {
                    console.log('Could not play yourwordis.mp3:', e);
                    resolve(); // Continue even if audio fails
                });
            });
        }

        function playWordAudio(word) {
            return new Promise((resolve) => {
                if (!wordAudioCache.has(word)) {
                    wordAudioCache.set(word, new Audio(`${word}.mp3`));
                }

                const audio = wordAudioCache.get(word);
                audio.currentTime = 0;

                audio.play().then(() => {
                    audio.onended = () => {
                        audio.onended = null;
                        audio.currentTime = 0;
                        resolve();
                    };
                }).catch(e => {
                    console.log('Could not play word audio:', e);
                    resolve();
                });
            });
        }

        async function playCurrentWord(includeIntro = true) {
            const currentWord = wordList[currentWordIndex];

            // Reset submission state
            canSubmit = false;
            hasSubmitted = false;

            // Disable input and hide play button during audio
            setAnswerEnabled(false);
            speakBtn.classList.add('hidden');

            updateAudioStatus('Listen carefully…', 'listening');

            try {
                if (includeIntro) {
                    // Play "your word" audio first
                    await playYourWordAudio();

                    // Small pause before the word
                    await new Promise(resolve => setTimeout(resolve, 300));
                }

                // Play the actual word
                await playWordAudio(currentWord);

                // Word finished playing - enable input and show play button
                canSubmit = true;
                setAnswerEnabled(true);
                inputEl.focus();
                setAnswerValue('');
                speakBtn.classList.remove('hidden');
                typingStartTime = null;
                currentInputChars = 0;
                updateWpmDisplay();

            } catch (e) {
                console.error('Error playing audio:', e);
                updateAudioStatus('Error playing audio', 'incorrect');

                // Even on error, enable input for manual retry
                canSubmit = true;
                setAnswerEnabled(true);
                inputEl.focus();
                speakBtn.classList.remove('hidden');
            }
        }

        // Homophone groups built from dictionary so each word can list alternates once
        const homophoneGroups = wordList.reduce((groups, word) => {
            const normalizedWord = normalize(word);
            const variants = new Set([normalizedWord]);

            (homophoneDictionary[normalizedWord] || []).forEach(variant => {
                variants.add(normalize(variant));
            });

            groups[normalizedWord] = Array.from(variants);
            return groups;
        }, {});

        function isCorrectSpelling(input, correctWord) {
            const normalizedInput = normalize(input);
            const normalizedCorrect = normalize(correctWord);

            // Check if input exactly matches the correct word
            if (normalizedInput === normalizedCorrect) {
                return true;
            }

            // Check if input is a valid homophone alternative
            for (const [key, variants] of Object.entries(homophoneGroups)) {
                if (variants.includes(normalizedCorrect) && variants.includes(normalizedInput)) {
                    return true;
                }
            }

            return false;
        }

        // Handle keyboard input
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Prevent form submission

                // Only allow submission if word has finished playing and hasn't been submitted yet
                if (!canSubmit || hasSubmitted) {
                    return; // Ignore submission attempt
                }

                hasSubmitted = true;
                const currentWord = wordList[currentWordIndex];
                const userAnswer = getAnswerValue();
                const correct = isCorrectSpelling(userAnswer, currentWord);
                updateWpmDisplay();
                showWpmTemporarily();

                if (correct) {
                    updateAudioStatus('Correct! ✓', 'correct');
                    correctSound.play().catch(e => console.log('Could not play sound:', e));

                    setTimeout(() => {
                        // Continue to next word
                        currentWordIndex = (currentWordIndex + 1) % wordList.length;
                        playCurrentWord();
                    }, 1500);

                } else {
                    updateAudioStatus(`Incorrect. The word was "${formatWord(currentWord)}"`, 'incorrect');
                    wrongSound.play().catch(e => console.log('Could not play sound:', e));

                    setTimeout(() => {
                        // Continue to next word
                        currentWordIndex = (currentWordIndex + 1) % wordList.length;
                        playCurrentWord();
                    }, 2000);
                }

                setAnswerValue('');
            }
        });

        speakBtn.addEventListener('click', () => {
            // Reset submission state for replay
            canSubmit = false;
            hasSubmitted = false;
            setAnswerEnabled(false);
            speakBtn.classList.add('hidden');
            setAnswerValue('');
            typingStartTime = null;
            currentInputChars = 0;
            updateWpmDisplay();

            // Replay current word without intro
            playCurrentWord(false);
        });

        // Start button handler
        startBtn.addEventListener('click', () => {
            console.log('Start button clicked');

            startBtn.textContent = 'Loading...';
            startBtn.disabled = true;

            setTimeout(() => {
                console.log('Game started');
                startBtn.remove();
                gameArea.classList.remove('hidden');
                inputEl.style.pointerEvents = 'auto';
                inputEl.style.opacity = '1';
                // Reset game state
                resetGame();

                // Start with first word
                playCurrentWord();
            }, 500);
        });

        inputEl.addEventListener('input', () => {
            if (!canSubmit || hasSubmitted) {
                return;
            }

            const currentLength = getAnswerValue().length;
            currentInputChars = currentLength;

            if (!typingStartTime && currentLength > 0) {
                typingStartTime = Date.now();
                // Hide WPM display when typing starts
                wpmDisplayEl.classList.add('hidden');
                if (wpmDisplayTimeout) {
                    clearTimeout(wpmDisplayTimeout);
                    wpmDisplayTimeout = null;
                }
            }

            updateWpmDisplay();
        });
    </script>
</body>
</html>
